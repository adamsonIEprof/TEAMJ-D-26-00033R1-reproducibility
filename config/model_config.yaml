project:
  title: "Forecast Accuracy versus Operational Trigger Value in Next-Day Truck Utilization Forecasting"
  target_primary: y_utilization_nextday
  target_secondary: y_secondary_capacity_rate
  train_label: "Train 2024"
  test_label: "Test 2025"
  random_seed: 42
  prediction_floor: 0.0
  data_mode: synthetic_public
  confidentiality_scope: underlying company data only

validation:
  method: sklearn.model_selection.TimeSeriesSplit
  n_splits: 5
  selection_metric: MAE
  holdout_start: "2025-01-01"
  paired_significance_alpha: 0.05
  paired_significance_method: Seven-observation circular moving-block bootstrap on paired absolute-error differences
  block_bootstrap_length: 7
  block_bootstrap_resamples: 2000

feature_blocks:
  order:
    - Calendar and seasonality
    - Autoregressive utilization
    - Workload and execution history
    - Capacity and readiness history
    - External fuel-price context
    - Sparse backload and event context
  s2_blocks:
    - Calendar and seasonality
    - Autoregressive utilization

models:
  random_forest_s2:
    n_estimators: 160
    max_depth: 6
    min_samples_leaf: 4
    max_features: sqrt
    random_state: 42
    n_jobs: 1
  xgboost_s2:
    n_estimators: 400
    max_depth: 3
    learning_rate: 0.03
    min_child_weight: 4
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.05
    reg_lambda: 1.0
    gamma: 0.0
    objective: reg:squarederror
    eval_metric: mae
    tree_method: hist
    random_state: 42
    n_jobs: 1
  lightgbm_s2:
    n_estimators: 400
    learning_rate: 0.03
    num_leaves: 15
    max_depth: 5
    min_child_samples: 20
    subsample: 0.8
    subsample_freq: 1
    colsample_bytree: 0.8
    reg_alpha: 0.05
    reg_lambda: 1.0
    deterministic: true
    force_col_wise: true
    random_state: 42
    n_jobs: 1
    verbosity: -1
  lstm_28:
    sequence_length: 28
    hidden_size: 32
    dense_size: 16
    num_layers: 1
    dropout: 0.0
    optimizer: Adam
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 16
    max_epochs: 150
    early_stopping_patience: 15
    early_stopping_min_delta: 0.00001
    internal_validation_fraction: 0.20
    input_scaling: StandardScaler fitted on training rows only
    target_scaling: StandardScaler fitted on training endpoints only
    sequence_definition: "28 consecutive eligible modeling-panel rows ending at each target row"
    random_seed: 42

clean_training:
  exclude_if_any_target_date_qa_flag: true
  exclude_target_date_structural_nonoperational: true

operational_bands:
  base_low: 0.80
  base_high: 1.20
  sensitivity_pairs:
    - [0.75, 1.15]
    - [0.80, 1.20]
    - [0.85, 1.25]

threshold_calibration:
  actual_stress_threshold: 1.20
  forecast_cutoff_grid_start: 0.60
  forecast_cutoff_grid_stop: 1.60
  forecast_cutoff_grid_step: 0.01
  false_positive_cost: 1.0
  false_negative_cost_ratios: [1, 2, 5, 10]
  calibration_sample: five-fold 2024 out-of-fold predictions only
  tie_breaking: minimum cost, then maximum F1, then lowest cutoff

cost_scenarios:
  - name: Conservative stress
    missed_stress_penalty: 2
    missed_backlog_penalty: 1
  - name: Moderate asymmetric
    missed_stress_penalty: 5
    missed_backlog_penalty: 2
  - name: High stress
    missed_stress_penalty: 10
    missed_backlog_penalty: 3
  - name: High service/backlog
    missed_stress_penalty: 5
    missed_backlog_penalty: 5
  - name: Severe combined
    missed_stress_penalty: 10
    missed_backlog_penalty: 5

missingness_sensitivity:
  synthetic_mask_rates: [0.05, 0.10, 0.20]
  imputation: training-fold median only
  repeats: 3

runtime_benchmark:
  repeats: 3
  inference_batch_rows: 271

retraining_guidance:
  default_cadence: monthly monitoring with quarterly refit assessment
  drift_trigger: refit review when rolling 28-day MAE exceeds validation MAE by 20 percent
  note: operational recommendation, not an empirically optimized cadence

asymmetric_metrics:
  underprediction_weights: [2, 5]
  stress_day_weight: 3
  pinball_quantiles: [0.75, 0.90]
